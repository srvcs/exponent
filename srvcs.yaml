schemaVersion: 1
name: "srvcs-exponent"
slug: "exponent"
repository: "srvcs/exponent"
package: "srvcs-exponent"
function: "arithmetic: base raised to exp (real)"
kind: "orchestrator"
categories:
  - "arithmetic"
dependencies:
  - slug: "floatpower"
    service: "srvcs-floatpower"
endpoints:
  - method: "GET"
    path: "/"
    purpose: "Service identity"
  - method: "POST"
    path: "/"
    purpose: "Evaluate the service function"
  - method: "GET"
    path: "/healthz"
    purpose: "Liveness probe"
  - method: "GET"
    path: "/readyz"
    purpose: "Readiness probe"
  - method: "GET"
    path: "/metrics"
    purpose: "Prometheus metrics"
  - method: "GET"
    path: "/openapi.json"
    purpose: "OpenAPI document"
inputs:
  - name: "base"
    type: "number"
    required: true
  - name: "exp"
    type: "number"
    required: true
outputs:
  - name: "base"
    type: "number"
  - name: "exp"
    type: "number"
  - name: "result"
    type: "number"
configuration:
  - name: "SRVCS_BIND_ADDR"
    default: "0.0.0.0:8080"
    purpose: "Bind address"
  - name: "SRVCS_ENV"
    default: "development"
    purpose: "Environment label for logs"
  - name: "RUST_LOG"
    default: "info,tower_http=info"
    purpose: "Tracing filter"
  - name: "SRVCS_FLOATPOWER_URL"
    default: "http://127.0.0.1:8090"
    purpose: "Base URL for srvcs-floatpower"
